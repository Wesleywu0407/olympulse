<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrisPulse Onboarding</title>
<link rel="stylesheet" href="css/prototype.css">
<script src="js/prototype.js" defer></script>
<link rel="stylesheet" href="css/screens/onboarding.css">
<link rel="stylesheet" href="css/dark-theme.css">
</head>
<body data-screen="onboarding">
  <main class="onboarding-screen" aria-label="Choose your BrisPulse identity">
    <div class="onboarding-topbar">
      <p class="top-label">BrisPulse</p>
      <button class="settings-button theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
        <svg viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 3.3v2M10 14.7v2M4.8 4.8l1.4 1.4M13.8 13.8l1.4 1.4M3.3 10h2M14.7 10h2M4.8 15.2l1.4-1.4M13.8 6.2l1.4-1.4" />
          <circle cx="10" cy="10" r="2.7" />
        </svg>
      </button>
    </div>

    <header class="intro">
      <h1>How are you moving<br>through Brisbane today?</h1>
      <p>We'll personalise your pressure view based on your needs.</p>
    </header>

    <section class="identity-list" aria-label="Select identity">
      <button class="identity-card" id="c-tourist" type="button" data-identity="tourist">
        <span class="identity-icon icon-blue" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 21s6-6.5 6-11a6 6 0 0 0-12 0c0 4.5 6 11 6 11Z" />
            <circle cx="12" cy="10" r="2.1" />
          </svg>
        </span>
        <span class="identity-copy">
          <strong>Visitor</strong>
          <em>Exploring the city</em>
          <span>Discover less crowded routes. See event hotspots in real time.</span>
        </span>
        <span class="selection-check" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M3.3 8.1 6.4 11.2 12.8 4.8" /></svg>
        </span>
      </button>

      <button class="identity-card selected" id="c-local" type="button" data-identity="local" aria-pressed="true">
        <span class="identity-glow" aria-hidden="true"></span>
        <span class="identity-icon icon-green" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4.5 10.4 12 4.2l7.5 6.2" />
            <path d="M6.5 9.8v9.3h11V9.8" />
            <path d="M10 19.1v-5.2h4v5.2" />
          </svg>
        </span>
        <span class="identity-copy">
          <strong>Local resident</strong>
          <em>Living in Brisbane</em>
          <span>Protect your everyday routes. Know when to avoid tourist hotspots.</span>
        </span>
        <span class="selection-check" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M3.3 8.1 6.4 11.2 12.8 4.8" /></svg>
        </span>
      </button>

      <button class="identity-card" id="c-commuter" type="button" data-identity="commuter">
        <span class="identity-icon icon-amber" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="8" width="14" height="10" rx="2" />
            <path d="M9 8V6.8A2.8 2.8 0 0 1 11.8 4h.4A2.8 2.8 0 0 1 15 6.8V8" />
            <path d="M12 11v3l2 1.2" />
          </svg>
        </span>
        <span class="identity-copy">
          <strong>Daily commuter</strong>
          <em>Getting to work or school</em>
          <span>Fast, efficient paths. Alerts when your usual route gets disrupted.</span>
        </span>
        <span class="selection-check" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M3.3 8.1 6.4 11.2 12.8 4.8" /></svg>
        </span>
      </button>
    </section>

    <button class="continue-button" id="cta" type="button">Continue</button>
  </main>

<script src="js/screens/onboarding.js" defer></script>
</body>
</html>
