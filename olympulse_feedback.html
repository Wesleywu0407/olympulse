<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrisPulse Arrival</title>
<link rel="stylesheet" href="css/prototype.css">
<script src="js/prototype.js" defer></script>
<link rel="stylesheet" href="css/screens/feedback.css">
<link rel="stylesheet" href="css/dark-theme.css">
<link rel="stylesheet" href="css/screens/after-content.css">
</head>
<body data-screen="feedback">
  <main class="arrival-screen after-screen" aria-label="BrisPulse arrival feedback">
    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>BrisPulse</span>
      </div>
      <div class="header-right">
        <span class="identity-pill">Local</span>
        <span class="arrival-status">You arrived</span>
        <button class="settings-button theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M10 3.3v2M10 14.7v2M4.8 4.8l1.4 1.4M13.8 13.8l1.4 1.4M3.3 10h2M14.7 10h2M4.8 15.2l1.4-1.4M13.8 6.2l1.4-1.4" />
            <circle cx="10" cy="10" r="2.7" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Success moment -->
    <section aria-label="Journey complete" style="display:flex;flex-direction:column;align-items:center;padding:28px 16px 16px;text-align:center;">
      <div style="width:56px;height:56px;background:#1D9E75;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <path d="M6 14.5l5.5 5.5L22 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 style="font-size:22px;font-weight:700;color:#eef2f7;margin:0 0 6px;">You made it</h1>
      <p style="font-size:13px;color:#8a9bb0;margin:0 0 18px;">Via West End · 19 min · avoided South Bank</p>
      <!-- Stats strip -->
      <div style="display:flex;gap:0;background:#1a2840;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;width:100%;">
        <div style="flex:1;padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.08);">
          <div style="font-size:16px;font-weight:700;color:#eef2f7;">19 min</div>
          <div style="font-size:10px;color:#8a9bb0;margin-top:2px;">taken</div>
        </div>
        <div style="flex:1;padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.08);">
          <div style="font-size:16px;font-weight:700;color:#1D9E75;">42 min</div>
          <div style="font-size:10px;color:#8a9bb0;margin-top:2px;">saved</div>
        </div>
        <div style="flex:1;padding:12px 8px;text-align:center;">
          <div style="font-size:16px;font-weight:700;color:#eef2f7;">1</div>
          <div style="font-size:10px;color:#8a9bb0;margin-top:2px;">crowd avoided</div>
        </div>
      </div>
    </section>

    <section class="after-section" aria-label="Place feedback">
      <div class="after-card">
        <article class="after-row">
          <div>
            <h1 class="after-title">How does it feel here?</h1>
            <p class="after-meta">Anonymous · 1 tap · helps everyone</p>
          </div>
        </article>
        <div class="after-row">
          <div class="after-feedback-grid">
            <button class="after-feedback-btn" type="button">
              <span aria-hidden="true">😌</span>
              Comfortable
            </button>
            <button class="after-feedback-btn" type="button">
              <span aria-hidden="true">😅</span>
              Busy
            </button>
            <button class="after-feedback-btn" type="button">
              <span aria-hidden="true">😰</span>
              Overwhelm
            </button>
          </div>
        </div>
        <div class="after-report-count">127 people reported · last 10 min</div>
        <article class="after-row">
          <span class="after-icon" aria-hidden="true">😅</span>
          <div>
            <h2 class="after-title">Busy</h2>
          </div>
          <span class="after-meta">64 reports</span>
        </article>
        <article class="after-row">
          <span class="after-icon" aria-hidden="true">😌</span>
          <div>
            <h2 class="after-title">Comfortable</h2>
          </div>
          <span class="after-meta">41</span>
        </article>
        <article class="after-row">
          <span class="after-icon" aria-hidden="true">😰</span>
          <div>
            <h2 class="after-title">Overwhelming</h2>
          </div>
          <span class="after-meta">22</span>
        </article>
      </div>
    </section>
  </main>

<script src="js/screens/feedback.js" defer></script>
</body>
</html>
