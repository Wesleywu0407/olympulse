<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrisPulse Access Choice</title>
<link rel="stylesheet" href="css/prototype.css">
<script src="js/prototype.js" defer></script>
<link rel="stylesheet" href="css/dark-theme.css">
<link rel="stylesheet" href="css/screens/after-content.css">
<style>
.delivery-choice-screen {
  padding: 0 0 88px;
}
.delivery-options {
  padding: 0 16px;
}
.after-kicker {
  margin-bottom: 14px;
}
.delivery-choice-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 15px 16px;
  margin-bottom: 10px;
  border-radius: 16px;
  border: 1.5px solid rgba(87, 108, 138, 0.35);
  background: #1a2840;
  color: #eef2f7;
  font: inherit;
  text-align: left;
  cursor: pointer;
  transition: border-color 160ms ease, background 160ms ease, transform 140ms ease;
  -webkit-tap-highlight-color: transparent;
}
.delivery-choice-btn:active {
  transform: scale(0.985);
}
.delivery-choice-btn.is-selected {
  border-color: #1D9E75;
  background: rgba(29, 158, 117, 0.15);
}
.delivery-choice-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: #243552;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.delivery-choice-btn.is-selected .delivery-choice-icon {
  background: rgba(29, 158, 117, 0.22);
}
.delivery-choice-icon svg {
  width: 20px;
  height: 20px;
  stroke: #8a9bb0;
  fill: none;
}
.delivery-choice-btn.is-selected .delivery-choice-icon svg {
  stroke: #5DCAA5;
}
.delivery-choice-copy strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: #eef2f7;
  line-height: 1.2;
}
.delivery-choice-copy span {
  display: block;
  margin-top: 3px;
  font-size: 12.5px;
  color: #8a9bb0;
}
.delivery-choice-btn.is-selected .delivery-choice-copy strong {
  color: #5DCAA5;
}
.delivery-callout {
  margin-top: 6px;
  padding: 11px 14px;
  border-left: 3px solid #1D9E75;
  border-radius: 0 10px 10px 0;
  background: rgba(29, 158, 117, 0.10);
  font-size: 13px;
  font-weight: 600;
  color: #5DCAA5;
}
</style>
</head>
<body data-screen="delivery">
  <main class="delivery-choice-screen after-screen" aria-label="Choose how to access BrisPulse">
    <div class="after-statusbar" aria-hidden="true">
      <span>9:41</span>
      <span class="after-phone-icons">
        <i></i><i></i><i></i>
        <b></b>
      </span>
    </div>

    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>BrisPulse</span>
        <span class="after-subtitle">Access pressure info</span>
      </div>
      <span class="live-dot" aria-hidden="true"></span>
    </header>

    <section class="delivery-options" aria-label="How would you like to use it?">
      <p class="after-kicker">How would you like to use it?</p>

      <!-- Standalone app -->
      <button class="delivery-choice-btn is-selected" type="button" data-next-screen="map">
        <div class="delivery-choice-icon">
          <svg viewBox="0 0 20 20" aria-hidden="true" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="10" height="16" rx="2"/>
            <path d="M8 15h4"/>
          </svg>
        </div>
        <div class="delivery-choice-copy">
          <strong>Standalone app</strong>
          <span>Full pressure + routes + feedback</span>
        </div>
      </button>

      <!-- Platform widget -->
      <button class="delivery-choice-btn" type="button" data-next-screen="map">
        <div class="delivery-choice-icon">
          <svg viewBox="0 0 20 20" aria-hidden="true" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="16" height="10" rx="2"/>
            <path d="M6 10h8M10 8v4"/>
          </svg>
        </div>
        <div class="delivery-choice-copy">
          <strong>Platform widget</strong>
          <span>Embed in MyTranslink or Maps</span>
        </div>
      </button>

      <!-- Hybrid -->
      <button class="delivery-choice-btn" type="button" data-next-screen="map">
        <div class="delivery-choice-icon">
          <svg viewBox="0 0 20 20" aria-hidden="true" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 10h12M10 5l5 5-5 5"/>
          </svg>
        </div>
        <div class="delivery-choice-copy">
          <strong>Hybrid</strong>
          <span>Deep links from existing apps</span>
        </div>
      </button>

      <aside class="delivery-callout">Modular pressure-awareness service</aside>
    </section>
  </main>

  <script>
    document.querySelectorAll('.delivery-choice-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.delivery-choice-btn').forEach(b => b.classList.remove('is-selected'));
        btn.classList.add('is-selected');
      });
    });
  </script>
  <nav class="olympulse-bottom-nav static-nav" aria-label="Prototype navigation">
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('onboarding')" data-nav-active="true">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 2C6.24 2 4 4.24 4 7c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5z" stroke-width="1.3"/><circle class="nav-fill" cx="9" cy="7" r="1.6"/></svg>
      <span>Start</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('map')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="7" stroke-width="1.3"/><circle class="nav-fill" cx="9" cy="9" r="2"/></svg>
      <span>Map</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('event')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 2l1.5 4.5H15l-3.8 2.7 1.5 4.5L9 11l-3.7 2.7 1.5-4.5L3 6.5h4.5z" stroke-width="1.2" fill="none"/></svg>
      <span>Events</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('feedback')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 5h12M3 9h8M3 13h10" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Report</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('insight')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="7" r="3" stroke-width="1.2"/><path d="M3 16c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Insights</span>
    </button>
  </nav>
</body>
</html>
