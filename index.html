<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BrisPulse Prototype</title>
  <link rel="stylesheet" href="css/prototype.css">
  <link rel="stylesheet" href="css/index.css">
  <script src="js/prototype.js" defer></script>
  <link rel="stylesheet" href="css/dark-theme.css">
  <link rel="stylesheet" href="css/screens/after-content.css">
</head>
<body>
  <main class="app" aria-label="BrisPulse mobile app prototype">
    <div class="screens">
      <section class="screen screen-home after-screen active" data-screen="map">
        <header class="header app-header">
          <div class="brand">
            <span class="brand-dot"></span>
            <span>BrisPulse</span>
            <span class="after-subtitle">What do you need?</span>
          </div>
          <div class="header-actions">
            <span class="status-pill">Local</span>
            <button class="settings-button theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M10 3.3v2M10 14.7v2M4.8 4.8l1.4 1.4M13.8 13.8l1.4 1.4M3.3 10h2M14.7 10h2M4.8 15.2l1.4-1.4M13.8 6.2l1.4-1.4" />
                <circle cx="10" cy="10" r="2.7" />
              </svg>
            </button>
          </div>
        </header>

        <section class="after-section" aria-label="BrisPulse action dashboard">
          <p class="after-kicker">Decision support</p>
          <div class="after-card">
            <button class="after-choice after-row" type="button">
              <span class="after-icon" aria-hidden="true">📍</span>
              <span>
                <strong class="after-title">View precinct pressure</strong>
                <span class="after-meta">See where it’s crowded now</span>
              </span>
            </button>
            <button class="after-choice after-row" type="button">
              <span class="after-icon" aria-hidden="true">🗺</span>
              <span>
                <strong class="after-title">Compare route options</strong>
                <span class="after-meta">Fastest, balanced, calmer</span>
              </span>
            </button>
            <button class="after-choice after-row" type="button">
              <span class="after-icon" aria-hidden="true">⚖</span>
              <span>
                <strong class="after-title">Understand the trade-off</strong>
                <span class="after-meta">Why this route is suggested</span>
              </span>
            </button>
            <button class="after-choice after-row" type="button">
              <span class="after-icon" aria-hidden="true">✓</span>
              <span>
                <strong class="after-title">Choose your path</strong>
                <span class="after-meta">Based on your priority</span>
              </span>
            </button>
            <button class="after-choice after-row" type="button">
              <span class="after-icon" aria-hidden="true">💬</span>
              <span>
                <strong class="after-title">Submit how it feels</strong>
                <span class="after-meta">Anonymous · 1 tap</span>
              </span>
            </button>
          </div>
        </section>
      </section>
    </div>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <a href="olympulse_role_selection.html"><svg viewBox="0 0 18 18"><path d="M9 2C6.3 2 4 4.3 4 7c0 3.6 5 9 5 9s5-5.4 5-9c0-2.7-2.3-5-5-5Z"/><circle cx="9" cy="7" r="1.4"/></svg><span>Start</span></a>
      <a href="olympulse_dashboard.html"><svg viewBox="0 0 18 18"><path d="M4 9.5 9 4l5 5.5V15H4z"/><path d="M7 15v-4h4v4"/></svg><span>Home</span></a>
      <a class="active" href="index.html"><svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7"/><circle cx="9" cy="9" r="2"/></svg><span>Map</span></a>
      <a href="olympulse_live_event_mode.html"><svg viewBox="0 0 18 18"><path d="M9 2l1.5 4.5H15l-3.8 2.7 1.5 4.5L9 11l-3.7 2.7 1.5-4.5L3 6.5h4.5z"/></svg><span>Events</span></a>
      <a href="olympulse_feedback.html"><svg viewBox="0 0 18 18"><path d="M3 5h12M3 9h8M3 13h10"/></svg><span>Report</span></a>
      <a href="olympulse_personal_insight.html"><svg viewBox="0 0 18 18"><circle cx="9" cy="7" r="3"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg><span>Insights</span></a>
    </nav>
  </main>
</body>
</html>
