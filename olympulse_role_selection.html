<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrisPulse Role Selection</title>
<link rel="stylesheet" href="css/prototype.css">
<script src="js/prototype.js" defer></script>
<link rel="stylesheet" href="css/screens/onboarding.css">
<link rel="stylesheet" href="css/dark-theme.css">
<link rel="stylesheet" href="css/screens/after-content.css">
</head>
<body data-screen="onboarding">
  <main class="role-selection-screen after-screen" aria-label="Select your BrisPulse role">
    <div class="onboarding-topbar">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>BrisPulse</span>
        <span class="after-subtitle">Who are you today?</span>
      </div>
      <button class="settings-button theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
        <svg viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 3.3v2M10 14.7v2M4.8 4.8l1.4 1.4M13.8 13.8l1.4 1.4M3.3 10h2M14.7 10h2M4.8 15.2l1.4-1.4M13.8 6.2l1.4-1.4" />
          <circle cx="10" cy="10" r="2.7" />
        </svg>
      </button>
    </div>

    <section class="after-section identity-list" aria-label="Select your role">
      <p class="after-kicker">Select your role</p>
      <button class="after-choice after-row identity-card selected" id="c-event-goer" type="button" data-identity="event-goer" aria-pressed="true">
        <span class="after-icon" aria-hidden="true">🎟</span>
        <span>
          <strong class="after-title">Event-goer</strong>
          <span class="after-meta">Active user · flexible routes</span>
        </span>
        <span class="selection-check" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M3.3 8.1 6.4 11.2 12.8 4.8" /></svg>
        </span>
      </button>

      <button class="after-choice after-row identity-card" id="c-resident" type="button" data-identity="resident">
        <span class="after-icon" aria-hidden="true">🏠</span>
        <span>
          <strong class="after-title">Resident</strong>
          <span class="after-meta">Affected user · protect access</span>
        </span>
        <span class="selection-check" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M3.3 8.1 6.4 11.2 12.8 4.8" /></svg>
        </span>
      </button>

      <button class="after-choice after-row identity-card" id="c-commuter" type="button" data-identity="commuter">
        <span class="after-icon" aria-hidden="true">🚆</span>
        <span>
          <strong class="after-title">Commuter</strong>
          <span class="after-meta">Affected user · time-sensitive</span>
        </span>
        <span class="selection-check" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M3.3 8.1 6.4 11.2 12.8 4.8" /></svg>
        </span>
      </button>
    </section>

    <button class="continue-button" id="cta" type="button">Continue</button>
  </main>

<script src="js/screens/onboarding.js" defer></script>
</body>
</html>
