<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrisPulse Route Selected</title>
<link rel="stylesheet" href="css/prototype.css">
<script src="js/prototype.js" defer></script>
<link rel="stylesheet" href="css/screens/route-selected.css">
<link rel="stylesheet" href="css/dark-theme.css">
<link rel="stylesheet" href="css/screens/after-content.css">
</head>
<body data-screen="routeSelected">
  <main class="route-selected-screen route-result-screen after-screen" aria-label="Selected BrisPulse route">
    <div class="after-statusbar" aria-hidden="true">
      <span>9:43</span>
      <span class="after-phone-icons">
        <i></i><i></i><i></i>
        <b></b>
      </span>
    </div>

    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>BrisPulse</span>
        <span class="after-subtitle">Balanced · South Bank</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="delivery-settings-btn" type="button" aria-label="Delivery settings" title="How to use BrisPulse" onclick="window.olympulseNavigate&&window.olympulseNavigate('delivery')">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 5h14M3 10h14M3 15h14"/><circle cx="7" cy="5" r="1.8" fill="currentColor" stroke="none"/><circle cx="13" cy="10" r="1.8" fill="currentColor" stroke="none"/><circle cx="7" cy="15" r="1.8" fill="currentColor" stroke="none"/></svg>
        </button>
        <span class="live-dot" aria-hidden="true"></span>
      </div>
    </header>

    <section class="after-section route-result-card" aria-label="Route result">
      <div class="after-card">
        <article class="route-result-heading">
          <h1 class="after-title">South Bank → Roma St</h1>
          <p class="after-meta">via Melbourne St · 15 min</p>
        </article>
        <div class="after-bar-stack" aria-label="Route quality metrics">
          <div class="after-metric">
            <span>Crowd</span>
            <b class="after-meter after-meter--amber"><i></i></b>
            <span>Mod</span>
          </div>
          <div class="after-metric">
            <span>Comfort</span>
            <b class="after-meter after-meter--green"><i></i></b>
            <span>Good</span>
          </div>
          <div class="after-metric">
            <span>Predictable</span>
            <b class="after-meter after-meter--blue"><i></i></b>
            <span>High</span>
          </div>
        </div>
      </div>

      <aside class="after-callout">
        <strong>Not in Google Maps / MyTranslink</strong>
        <span>Crowd pressure · comfort trade-offs · event-specific explanations</span>
      </aside>
    </section>
  </main>
  <script>
    // Fallback: ensure nav is always present on this screen
    document.addEventListener('DOMContentLoaded', () => {
      if (!document.querySelector('.olympulse-bottom-nav')) {
        if (window.olympulseAddNav) {
          window.olympulseAddNav();
        }
      }
    });
  </script>
</body>
</html>
