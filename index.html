<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BrisPulse Prototype</title>
  <link rel="stylesheet" href="css/prototype.css">
  <link rel="stylesheet" href="css/index.css">
  <script src="js/prototype.js" defer></script>
  <link rel="stylesheet" href="css/dark-theme.css">
</head>
<body>
  <main class="app" aria-label="BrisPulse mobile app prototype">
    <div class="screens">
      <section class="screen screen-home active" data-screen="map">
        <header class="header app-header">
          <div class="brand"><span class="brand-dot"></span><span>BrisPulse</span></div>
          <div class="header-actions">
            <span class="status-pill">South Bank is tense</span>
            <button class="settings-button theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M10 3.3v2M10 14.7v2M4.8 4.8l1.4 1.4M13.8 13.8l1.4 1.4M3.3 10h2M14.7 10h2M4.8 15.2l1.4-1.4M13.8 6.2l1.4-1.4" />
                <circle cx="10" cy="10" r="2.7" />
              </svg>
            </button>
          </div>
        </header>

        <section class="map-card map-card--hero" aria-label="Brisbane pressure map">
          <svg viewBox="0 0 350 350" aria-hidden="true">
            <rect width="350" height="350" rx="28" fill="#F8F6F1"/>
            <g stroke="#E5E0D7" stroke-width="1.6" stroke-linecap="round" opacity="0.82">
              <path d="M26 66H324M26 122H324M26 180H324M26 238H324"/>
              <path d="M70 28V286M128 28V286M187 28V286M246 28V286M304 28V286"/>
              <path d="M34 264C82 220 126 189 177 170C231 150 275 112 318 70"/>
              <path d="M38 52C86 88 124 112 169 136C218 162 258 196 314 250"/>
              <path d="M52 306C97 284 135 278 176 286C226 295 267 286 312 266"/>
            </g>
            <g fill="#ECE7DE" opacity="0.66">
              <rect x="84" y="78" width="42" height="32" rx="7"/>
              <rect x="200" y="76" width="48" height="36" rx="7"/>
              <rect x="246" y="190" width="50" height="34" rx="7"/>
              <rect x="66" y="202" width="44" height="32" rx="7"/>
              <rect x="142" y="220" width="34" height="28" rx="7"/>
            </g>
            <path d="M-8 306C44 286 88 298 134 312C191 329 232 304 278 292C310 284 332 292 358 306" stroke="#D7E0DA" stroke-width="26" fill="none" stroke-linecap="round"/>
            <path d="M-8 306C44 286 88 298 134 312C191 329 232 304 278 292C310 284 332 292 358 306" stroke="#EBF0EA" stroke-width="13" fill="none" stroke-linecap="round"/>
            <g class="pressure-zone pressure-zone--south-bank">
              <circle cx="218" cy="214" r="86" fill="#DE7A55" opacity="0.06"/>
              <circle cx="218" cy="214" r="66" fill="#DE7A55" opacity="0.09"/>
              <circle cx="218" cy="214" r="47" fill="#DE7A55" opacity="0.13"/>
              <circle cx="218" cy="214" r="28" fill="#DE7A55" opacity="0.20"/>
            </g>
            <g class="pressure-zone pressure-zone--west-end">
              <circle cx="104" cy="232" r="50" fill="#24956F" opacity="0.07"/>
              <circle cx="104" cy="232" r="32" fill="#24956F" opacity="0.12"/>
            </g>
            <g class="pressure-zone pressure-zone--cbd">
              <circle cx="265" cy="110" r="42" fill="#E5A24F" opacity="0.07"/>
              <circle cx="265" cy="110" r="26" fill="#E5A24F" opacity="0.12"/>
            </g>
            <path class="route-line route-line--blocked" d="M92 84 C140 126 181 164 218 214 C250 255 279 268 310 258" fill="none"/>
            <path class="route-line route-line--calm" d="M92 84 C75 126 78 188 104 232 C154 262 239 270 310 258" fill="none"/>
            <circle cx="92" cy="84" r="9" fill="#FFFFFF" stroke="#24956F" stroke-width="2"/>
            <circle cx="92" cy="84" r="3.6" fill="#24956F"/>
            <circle cx="310" cy="258" r="6" fill="#FFFFFF" stroke="#29251F" stroke-width="1.5" opacity="0.85"/>
            <g>
              <rect x="180" y="196" width="76" height="22" rx="11" fill="#FFF0EA"/>
              <text x="218" y="211" text-anchor="middle" fill="#A85A3A" font-size="8.5" font-weight="800">TENSE ZONE</text>
            </g>
            <g>
              <rect x="88" y="246" width="86" height="22" rx="11" fill="#EEF8F3"/>
              <text x="131" y="261" text-anchor="middle" fill="#1D6F55" font-size="8.5" font-weight="800">CALMER PATH</text>
            </g>
            <text class="map-label" x="92" y="66" text-anchor="middle">Roma St</text>
            <text class="map-label" x="218" y="236" text-anchor="middle">South Bank</text>
            <text class="map-label" x="104" y="216" text-anchor="middle">West End</text>
            <text class="map-label" x="265" y="93" text-anchor="middle">CBD</text>
          </svg>
          <div class="map-badge"><strong>Suggested route</strong><span>Avoiding South Bank pressure</span></div>
          <div class="legend"><span><span class="legend-dot legend-dot--high"></span>Tense</span><span><span class="legend-dot legend-dot--mid"></span>Building</span><span><span class="legend-dot legend-dot--calm"></span>Calm</span></div>
        </section>

        <div class="search destination-search"><svg viewBox="0 0 20 20"><circle cx="8.7" cy="8.7" r="5.2"/><path d="M12.6 12.6 16.8 16.8"/></svg><span>Where are you going?</span></div>

        <div class="section-row route-section-header"><p class="section-title">Choose your pressure level</p><span>Updated 30s ago</span></div>
        <div class="route-list route-options">
          <button class="route-card" type="button">
            <span class="route-icon route-icon--pressure"><svg viewBox="0 0 20 20"><path d="M4 10h11M10.8 5.7 15.1 10l-4.3 4.3"/></svg></span>
            <span class="route-copy"><span class="card-title">Fastest</span><span class="text-pressure caption">14 min · passes near tense crowds</span></span>
            <span class="route-meta"><strong>14 min</strong><span class="pressure-bars"><b class="bar--mid bar-height--3"></b><b class="bar--mid bar-height--4"></b><b class="bar--mid bar-height--3"></b><b class="bar-height--3"></b><b class="bar-height--3"></b></span></span>
          </button>
          <button class="route-card route-card--recommended" type="button">
            <span class="route-icon"><svg viewBox="0 0 20 20"><path d="M10 4v11M5.7 10.8 10 15.1l4.3-4.3"/></svg></span>
            <span class="route-copy"><span class="route-heading"><span class="card-title">Comfortable</span><span class="recommendation-chip">Recommended</span></span><span class="text-calm caption">18 min · calmer via West End</span></span>
            <span class="route-meta"><strong>18 min</strong><span class="pressure-bars"><b class="bar--calm bar-height--1"></b><b class="bar--calm bar-height--2"></b><b class="bar--calm bar-height--1"></b><b class="bar--mid bar-height--2"></b><b class="bar-height--3"></b></span></span>
          </button>
          <button class="route-card" type="button"><span class="route-icon route-icon--calm"><svg viewBox="0 0 20 20"><path d="M5.5 10.5 8.7 13.7 14.8 6.8"/></svg></span><span class="route-copy"><span class="card-title">Least crowded</span><span class="text-calm caption">22 min · quietest streets</span></span><span class="route-meta"><strong>22 min</strong><span class="pressure-bars"><b class="bar--calm bar-height--1"></b><b class="bar--calm bar-height--1"></b><b class="bar-height--3"></b><b class="bar-height--3"></b><b class="bar-height--3"></b></span></span></button>
        </div>
      </section>
    </div>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <a href="olympulse_onboarding.html"><svg viewBox="0 0 18 18"><path d="M9 2C6.3 2 4 4.3 4 7c0 3.6 5 9 5 9s5-5.4 5-9c0-2.7-2.3-5-5-5Z"/><circle cx="9" cy="7" r="1.4"/></svg><span>Start</span></a>
      <a class="active" href="index.html"><svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7"/><circle cx="9" cy="9" r="2"/></svg><span>Map</span></a>
      <a href="olympulse_live_event_mode.html"><svg viewBox="0 0 18 18"><path d="M9 2l1.5 4.5H15l-3.8 2.7 1.5 4.5L9 11l-3.7 2.7 1.5-4.5L3 6.5h4.5z"/></svg><span>Events</span></a>
      <a href="olympulse_feedback.html"><svg viewBox="0 0 18 18"><path d="M3 5h12M3 9h8M3 13h10"/></svg><span>Report</span></a>
      <a href="olympulse_personal_insight.html"><svg viewBox="0 0 18 18"><circle cx="9" cy="7" r="3"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg><span>Insights</span></a>
    </nav>
  </main>
</body>
</html>
