<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrisPulse Dashboard</title>
<link rel="stylesheet" href="css/prototype.css">
<script src="js/prototype.js" defer></script>
<link rel="stylesheet" href="css/dark-theme.css">
<link rel="stylesheet" href="css/screens/after-content.css">
</head>
<body data-screen="dashboard">
  <main class="dashboard-screen after-screen" aria-label="BrisPulse decision support dashboard">
    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>BrisPulse</span>
        <span class="after-subtitle">What do you need?</span>
      </div>
      <div class="header-actions">
        <span class="live-dot" aria-hidden="true"></span>
      </div>
    </header>

    <!-- Live pressure strip -->
    <div style="display:flex;gap:8px;padding:0 16px 4px;overflow-x:auto;scrollbar-width:none;">
      <div style="flex-shrink:0;padding:7px 12px;background:rgba(226,75,74,0.12);border:1px solid rgba(226,75,74,0.3);border-radius:20px;font-size:12px;color:#E24B4A;white-space:nowrap;">🔴 South Bank · Surge</div>
      <div style="flex-shrink:0;padding:7px 12px;background:rgba(239,159,39,0.12);border:1px solid rgba(239,159,39,0.3);border-radius:20px;font-size:12px;color:#EF9F27;white-space:nowrap;">🟡 Roma St · Building</div>
      <div style="flex-shrink:0;padding:7px 12px;background:rgba(29,158,117,0.12);border:1px solid rgba(29,158,117,0.3);border-radius:20px;font-size:12px;color:#5DCAA5;white-space:nowrap;">🟢 West End · Calm</div>
      <div style="flex-shrink:0;padding:7px 12px;background:rgba(239,159,39,0.12);border:1px solid rgba(239,159,39,0.3);border-radius:20px;font-size:12px;color:#EF9F27;white-space:nowrap;">🟡 Gabba · Busy</div>
    </div>

    <section class="dashboard-actions" aria-label="Decision support actions">

      <!-- Primary actions -->
      <p style="padding:4px 4px 8px;font-size:11px;font-weight:700;letter-spacing:0.1em;color:#4d6070;text-transform:uppercase;">Navigate</p>

      <button class="after-choice after-row" type="button" data-next-screen="map">
        <span class="after-icon after-icon--pressure" aria-hidden="true">📍</span>
        <span>
          <strong class="after-title">View precinct pressure</strong>
          <span class="after-meta">See where it’s crowded now</span>
        </span>
      </button>
      <button class="after-choice after-row" type="button" data-next-screen="map">
        <span class="after-icon after-icon--map" aria-hidden="true">🗺</span>
        <span>
          <strong class="after-title">Compare route options</strong>
          <span class="after-meta">Fastest, balanced, calmer</span>
        </span>
      </button>
      <button class="after-choice after-row" type="button" data-next-screen="routeSelected">
        <span class="after-icon" aria-hidden="true">⚖</span>
        <span>
          <strong class="after-title">Understand the trade-off</strong>
          <span class="after-meta">Why this route is suggested</span>
        </span>
      </button>
      <button class="after-choice after-row" type="button" data-next-screen="liveReroute">
        <span class="after-icon" aria-hidden="true">🔄</span>
        <span>
          <strong class="after-title">Live reroute alert</strong>
          <span class="after-meta">Surge detected · new path available</span>
        </span>
      </button>

      <!-- Event & community section -->
      <p style="padding:12px 4px 8px;font-size:11px;font-weight:700;letter-spacing:0.1em;color:#4d6070;text-transform:uppercase;">Event &amp; Community</p>

      <button class="after-choice after-row" type="button" data-next-screen="event">
        <span class="after-icon" aria-hidden="true">⭐</span>
        <span>
          <strong class="after-title">Live event mode</strong>
          <span class="after-meta">Athletics · Suncorp · 9:30 PM tonight</span>
        </span>
      </button>
      <button class="after-choice after-row" type="button" data-next-screen="feedback">
        <span class="after-icon after-icon--feedback" aria-hidden="true">💬</span>
        <span>
          <strong class="after-title">Submit how it feels</strong>
          <span class="after-meta">Anonymous · 1 tap · helps everyone</span>
        </span>
      </button>
      <button class="after-choice after-row" type="button" data-next-screen="insight">
        <span class="after-icon" aria-hidden="true">📊</span>
        <span>
          <strong class="after-title">Your personal insights</strong>
          <span class="after-meta">42 min saved this week · 5 detours</span>
        </span>
      </button>

    </section>
  </main>
  <nav class="olympulse-bottom-nav static-nav" aria-label="Prototype navigation">
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('onboarding')" data-nav-active="true">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 2C6.24 2 4 4.24 4 7c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5z" stroke-width="1.3"/><circle class="nav-fill" cx="9" cy="7" r="1.6"/></svg>
      <span>Start</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('map')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="7" stroke-width="1.3"/><circle class="nav-fill" cx="9" cy="9" r="2"/></svg>
      <span>Map</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('event')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 2l1.5 4.5H15l-3.8 2.7 1.5 4.5L9 11l-3.7 2.7 1.5-4.5L3 6.5h4.5z" stroke-width="1.2" fill="none"/></svg>
      <span>Events</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('feedback')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 5h12M3 9h8M3 13h10" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Report</span>
    </button>
    <button type="button" class="olympulse-bottom-nav__item" onclick="window.olympulseNavigate&&window.olympulseNavigate('insight')">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="7" r="3" stroke-width="1.2"/><path d="M3 16c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Insights</span>
    </button>
  </nav>
</body>
</html>
